<svg class="thumb" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" id="svg2-el">
      <rect width="400" height="200" fill="#0a0a1a"/>
      <rect x="0" y="0" width="400" height="4" fill="#a855f7"/>
      <!-- terminal bg -->
      <rect x="16" y="16" width="268" height="168" rx="8" fill="#111827" stroke="#1f2937" stroke-width="1"/>
      <rect x="16" y="16" width="268" height="28" rx="8" fill="#1f2937"/>
      <rect x="16" y="36" width="268" height="8" fill="#1f2937"/>
      <!-- traffic lights -->
      <circle cx="32" cy="30" r="5" fill="#ef4444"/>
      <circle cx="48" cy="30" r="5" fill="#f59e0b"/>
      <circle cx="64" cy="30" r="5" fill="#22c55e"/>
      <text x="160" y="34" text-anchor="middle" fill="#6b7280" font-size="9" font-family="monospace">code-assistant ~ terminal</text>
      <!-- code lines -->
      <text x="28" y="62" fill="#6b7280" font-size="9" font-family="monospace">$ ask "explain recursion"</text>
      <text x="28" y="76" fill="#a855f7" font-size="9" font-family="monospace">▶ Gemini LLM</text>
      <text x="28" y="90" fill="#d1d5db" font-size="9" font-family="monospace">Recursion is a function that</text>
      <text x="28" y="103" fill="#d1d5db" font-size="9" font-family="monospace">calls itself with a base case</text>
      <text x="28" y="116" fill="#22c55e" font-size="9" font-family="monospace">// Example:</text>
      <text x="28" y="129" fill="#93c5fd" font-size="9" font-family="monospace">int fact(int n) {'{'}</text>
      <text x="28" y="142" fill="#93c5fd" font-size="9" font-family="monospace">  if(n==1) return 1;</text>
      <text x="28" y="155" fill="#93c5fd" font-size="9" font-family="monospace">  return n * fact(n-1);</text>
      <text x="28" y="168" fill="#93c5fd" font-size="9" font-family="monospace">{'}'}</text>
      <!-- Right panel - Gemini -->
      <rect x="296" y="16" width="88" height="168" rx="8" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1"/>
      <circle cx="340" cy="52" r="20" fill="#2d1b69" stroke="#a855f7" stroke-width="1.5"/>
      <text x="340" y="57" text-anchor="middle" fill="#c4b5fd" font-size="14" font-family="monospace">✦</text>
      <text x="340" y="84" text-anchor="middle" fill="#a855f7" font-size="9" font-family="monospace">Gemini</text>
      <text x="340" y="96" text-anchor="middle" fill="#6b7280" font-size="9" font-family="monospace">LLM API</text>
      <line x1="296" y1="120" x2="296" y2="150" stroke="#3b1f6b" stroke-width="1"/>
      <text x="340" y="116" text-anchor="middle" fill="#6b7280" font-size="8" font-family="monospace">Spring Boot</text>
      <text x="340" y="128" text-anchor="middle" fill="#6b7280" font-size="8" font-family="monospace">REST API</text>
      <text x="340" y="148" text-anchor="middle" fill="#6b7280" font-size="8" font-family="monospace">Async</text>
      <text x="340" y="160" text-anchor="middle" fill="#6b7280" font-size="8" font-family="monospace">Tokens</text>
      <!-- Arrow between terminal and gemini -->
      <line x1="284" y1="80" x2="296" y2="80" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2"/>
    </svg>